<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShikshaChain - Teacher Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-gray-50 text-gray-800">
    <div class="container mx-auto p-4 md:p-8">
      <header
        class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-lg"
      >
        <div class="flex items-center gap-4">
          <a href="index.html" class="text-indigo-600 hover:text-indigo-800"
            >&larr; Back to Portal</a
          >
          <h1 class="text-4xl font-extrabold text-gray-800">
            Teacher Portal 🧑‍🏫
          </h1>
        </div>
        <button
          id="connectBtn"
          class="mt-4 md:mt-0 bg-indigo-600 text-white font-semibold py-2 px-6 rounded-lg shadow-md hover:bg-indigo-700 transition-all duration-300"
        >
          Connect MetaMask
        </button>
      </header>

      <div class="space-y-8">
        <section class="bg-white p-6 rounded-xl shadow-lg">
          <h2 class="text-3xl font-bold mb-4 border-b pb-3 text-indigo-700">
            Exam Management
          </h2>
          <div class="mb-6">
            <button
              id="createNewExamBtn"
              class="w-full bg-indigo-500 text-white font-bold py-3 px-6 rounded-lg hover:bg-indigo-600 transition disabled:bg-gray-400"
            >
              + Create New Exam
            </button>
          </div>
          <div>
            <h3 class="font-semibold text-xl mb-3">All Exams</h3>
            <div
              id="allExamsList"
              class="space-y-3 max-h-96 overflow-y-auto p-2 border rounded-lg bg-gray-50"
            >
              <p class="text-gray-500">Connect wallet to view exams.</p>
            </div>
          </div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-lg">
          <h3 class="font-semibold text-xl mb-3">Status Log</h3>
          <div
            id="teacherStatus"
            class="p-3 bg-gray-800 text-white rounded-lg shadow-inner text-sm font-mono whitespace-pre-wrap h-40 overflow-y-auto"
          ></div>
        </section>
      </div>
    </div>

    <div
      id="testBuilderModal"
      class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden p-4 z-50"
    >
      <div
        class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-3xl flex flex-col"
        style="height: 90vh"
      >
        <div class="flex justify-between items-center border-b pb-3 mb-6">
          <h3 class="text-2xl font-bold text-gray-800">Exam Form Builder</h3>
          <button
            id="closeBuilderModal"
            class="text-gray-500 hover:text-gray-800 font-bold text-2xl"
          >
            &times;
          </button>
        </div>
        <div class="flex-grow overflow-y-auto pr-2">
          <div class="space-y-4 mb-6">
            <input
              id="examName"
              class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
              placeholder="Exam Name (e.g., Physics Final 2025)"
            />
            <div>
              <label
                for="modalStartTime"
                class="block text-sm font-medium text-gray-700"
                >Start Time</label
              >
              <input
                id="modalStartTime"
                type="datetime-local"
                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
              />
            </div>
            <div>
              <label
                for="modalEndTime"
                class="block text-sm font-medium text-gray-700"
                >End Time</label
              >
              <input
                id="modalEndTime"
                type="datetime-local"
                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
              />
            </div>
          </div>
          <div id="questionsContainer" class="space-y-6"></div>
        </div>
        <div class="mt-6 pt-6 border-t flex gap-4">
          <button
            id="addQuestionBtn"
            class="w-1/2 bg-blue-500 text-white font-bold py-3 rounded-lg hover:bg-blue-600 transition"
          >
            Add Question
          </button>
          <button
            id="saveCustomTestBtn"
            class="w-1/2 bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition"
          >
            Save Test
          </button>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.ethers.io/lib/ethers-5.7.2.min.js"
      type="text/javascript"
    ></script>
    <script src="teacher.js"></script>
  </body>
</html>
