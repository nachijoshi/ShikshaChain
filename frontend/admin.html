<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShikshaChain - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-gray-50 text-gray-800">
    <div class="container mx-auto p-4 md:p-8">
      <header
        class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-lg"
      >
        <div class="flex items-center gap-4">
          <a href="index.html" class="text-indigo-600 hover:text-indigo-800"
            >&larr; Back to Portal</a
          >
          <h1 class="text-4xl font-extrabold text-gray-800">Admin Portal 🛡️</h1>
        </div>
        <button
          id="connectBtn"
          class="mt-4 md:mt-0 bg-indigo-600 text-white font-semibold py-2 px-6 rounded-lg shadow-md hover:bg-indigo-700 transition-all duration-300"
        >
          Connect MetaMask
        </button>
      </header>

      <section
        id="admin-panel"
        class="bg-white p-6 rounded-xl shadow-lg hidden"
      >
        <h2 class="text-3xl font-bold mb-4 border-b pb-3 text-slate-700">
          Pending Login Requests
        </h2>
        <div
          id="pendingRequestsList"
          class="space-y-3 h-96 overflow-y-auto p-2 border rounded-lg bg-gray-50"
        >
          <p class="text-gray-500">Loading pending requests...</p>
        </div>
      </section>

      <div
        id="adminStatus"
        class="mt-8 p-3 bg-gray-800 text-white rounded-lg shadow-inner text-sm font-mono whitespace-pre-wrap h-40 overflow-y-auto"
      ></div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
